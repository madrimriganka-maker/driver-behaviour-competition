name: Update Leaderboard

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  score:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Fetch ground truth file
        env:
          GT_TOKEN: ${{ secrets.GT_ACCESS_TOKEN }}
        run: |
          git clone https://x-access-token:${GT_TOKEN}@github.com/siyaagarwal2005/competition-ground-truth.git gt_repo
          cp gt_repo/test_motion_data.csv data/test_motion_data.csv

      - name: Run scoring script
        run: python leaderboard/update_leaderboard.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "Auto-update leaderboard [skip ci]"
          git push