name: Update Leaderboard

on:
  push:
    branches:
      - main
    paths:
      - "submissions/**"
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Checkout ground truth repo
        uses: actions/checkout@v4
        with:
          repository: siyaagarwal2005/competition-ground-truth
          token: ${{ secrets.GT_ACCESS_TOKEN }}
          path: gt_repo

      - name: Copy ground truth file
        run: cp gt_repo/test_motion_data.csv data/test_motion_data.csv

      - name: Run scoring script
        run: python leaderboard/update_leaderboard.py

      - name: Commit updated leaderboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.json
          git diff --staged --quiet || git commit -m "Auto-update leaderboard [skip ci]"
          git push